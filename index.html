<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>꽃</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        min-height: 100svh;
        display: flex;
        font-family: "Nanum Myeongjo", serif;
        color: #20262b;
        background: #e4e7e6;
        line-height: 1.5;
        padding: clamp(20px, 5vw, 56px);
        -webkit-font-smoothing: antialiased;
      }

      .box {
        width: 100%;
        max-width: 720px;
        margin: auto;
        background: #f7f8f7;
        border: 1px solid #c9cecb;
        border-radius: 4px;
        padding: clamp(44px, 9vw, 96px) clamp(28px, 8vw, 80px);
        box-shadow: 0 18px 40px -28px rgba(30, 40, 35, 0.4);
      }

      .meta {
        font-size: 0.78rem;
        letter-spacing: 0.34em;
        text-transform: uppercase;
        color: #97a09c;
        text-align: center;
        margin-bottom: clamp(28px, 6vw, 48px);
      }

      .title {
        font-weight: 700;
        font-size: clamp(2.2rem, 9vw, 3.4rem);
        line-height: 1.2;
        letter-spacing: -0.01em;
        text-align: center;
        margin-bottom: 0.6em;
      }

      .author {
        font-size: 0.95rem;
        color: #6a726e;
        text-align: right;
        margin-bottom: clamp(40px, 9vw, 80px);
      }

      .author::before {
        content: "";
        display: inline-block;
        width: 22px;
        height: 1px;
        background: #b3b9b5;
        vertical-align: middle;
        margin-right: 12px;
      }

      .poem {
        font-size: clamp(1.12rem, 4.4vw, 1.45rem);
        line-height: 2.2;
        text-align: center;
        word-break: keep-all;
      }

      .poem p {
        margin-bottom: 1.6em;
      }

      .poem p:last-child {
        margin-bottom: 0;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <p class="meta">시</p>

      <h1 class="title">꽃</h1>
      <p class="author">김춘수</p>

      <div class="poem">
        <p>
          내가 그의 이름을 불러주기 전에는<br />그는 다만<br />하나의 몸짓에
          지나지 않았다.
        </p>

        <p>
          내가 그의 이름을 불러주었을 때,<br />그는 나에게로 와서<br />꽃이
          되었다.
        </p>

        <p>
          내가 그의 이름을 불러준 것처럼<br />나의 이 빛깔과 향기에 알맞은<br />누가
          나의 이름을 불러다오.<br />그에게로 가서 나도<br />그의 꽃이 되고
          싶다.
        </p>

        <p>
          우리들은 모두<br />무엇이 되고 싶다.<br />너는 나에게 나는 너에게<br />잊혀지지
          않는 하나의 눈짓이 되고 싶다.
        </p>
      </div>
    </div>
  </body>
</html>
