<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>겨울새</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        min-height: 100svh;
        display: flex;
        font-family: "Nanum Myeongjo", serif;
        color: #20262b;
        background: #eef0ef;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
      }

      .page {
        width: 100%;
        max-width: 720px;
        margin: auto;
        padding: clamp(56px, 12vw, 140px) clamp(28px, 8vw, 80px);
      }

      .meta {
        font-size: 0.78rem;
        font-weight: 400;
        letter-spacing: 0.34em;
        text-transform: uppercase;
        color: #97a09c;
        margin-bottom: clamp(40px, 9vw, 72px);
      }

      .title {
        font-weight: 700;
        font-size: clamp(2.2rem, 9vw, 3.4rem);
        line-height: 1.2;
        letter-spacing: -0.01em;
        margin-bottom: 0.5em;
      }

      .author {
        font-size: 0.95rem;
        color: #6a726e;
        margin-bottom: clamp(48px, 11vw, 96px);
      }

      .author::before {
        content: "";
        display: inline-block;
        width: 22px;
        height: 1px;
        background: #b3b9b5;
        vertical-align: middle;
        margin-right: 12px;
      }

      .poem {
        font-size: clamp(1.15rem, 4.6vw, 1.5rem);
        line-height: 2.2;
        word-break: keep-all;
      }

      .poem p {
        margin-bottom: 1.4em;
      }

      .poem p:last-child {
        margin-bottom: 0;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <p class="meta">시</p>

      <h1 class="title">겨울새</h1>
      <p class="author">윤삼현</p>

      <div class="poem">
        <p>하늘을 나는 새를 봐<br />질서 공부 끝</p>
      </div>
    </div>
  </body>
</html>
